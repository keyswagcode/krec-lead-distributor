<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Key Loan Scoreboard</title>
<meta name="robots" content="noindex,nofollow">
<style>
  /* ---- tokens: validated dark palette; gold = brand accent only ---- */
  :root{
    --surface:#101318; --panel:#171b22; --panel-2:#20252e; --line:#2b313c;
    --ink:#ffffff; --ink-2:#c3c2b7; --ink-3:#828a96;
    --data:#3987e5; --data-2:#199e70; --brand:#e9b83c; --good:#22c55e;
    --gold:#e9b83c; --silver:#c7cfdc; --bronze:#cd8a52;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--surface);color:var(--ink);overflow:hidden;cursor:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

  /* subtle ambient glow (kept from v1, dialed down) */
  .aurora{position:fixed;inset:-25%;z-index:0;filter:blur(90px);opacity:.28;pointer-events:none}
  .blob{position:absolute;width:44vw;height:44vw;border-radius:50%}
  .b1{background:radial-gradient(circle,#1d4ed8 0%,transparent 65%);top:-8%;left:-6%;animation:d1 30s ease-in-out infinite alternate}
  .b2{background:radial-gradient(circle,#0e7490 0%,transparent 65%);bottom:-14%;right:-8%;animation:d2 36s ease-in-out infinite alternate}
  @keyframes d1{to{transform:translate(8vw,6vh) scale(1.15)}}
  @keyframes d2{to{transform:translate(-7vw,-5vh) scale(.9)}}

  #app{position:relative;z-index:2;display:flex;flex-direction:column;height:calc(100vh - 6vh);padding:2vh 2.2vw 1.2vh;gap:1.4vh}
  header{display:flex;align-items:center;gap:1vw}
  .logo{display:flex;align-items:baseline;gap:.5vw;white-space:nowrap}
  .logo b{font-size:2.6vh;letter-spacing:.16em;color:var(--brand);font-weight:800}
  .logo span{font-size:2.6vh;letter-spacing:.16em;font-weight:800}
  .live{display:flex;align-items:center;gap:.45vw;color:var(--ink-3);font-size:1.5vh;margin-left:.8vw}
  .livedot{width:.9vh;height:.9vh;border-radius:50%;background:var(--good);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  #clock{margin-left:auto;font-size:2.1vh;color:var(--ink-2);font-weight:600}

  .tiles{display:grid;grid-template-columns:repeat(4,1fr);gap:1vw}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:1.2vh;padding:1.5vh 1.3vw;animation:in .5s ease both}
  .tiles .tile:nth-child(2){animation-delay:.07s}.tiles .tile:nth-child(3){animation-delay:.14s}.tiles .tile:nth-child(4){animation-delay:.21s}
  @keyframes in{from{opacity:0;transform:translateY(12px)}to{opacity:1}}
  .tile .k{font-size:1.5vh;letter-spacing:.13em;color:var(--ink-3);text-transform:uppercase}
  .tile .v{font-size:4.4vh;font-weight:800;margin-top:.3vh}
  .tile .s{font-size:1.6vh;color:var(--ink-2);margin-top:.2vh;min-height:1.6vh}
  .tile.ytd .v{color:var(--data)} .tile.month .v{color:var(--data-2)}

  main{flex:1;display:grid;grid-template-columns:1.75fr 1fr;gap:1vw;min-height:0}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:1.2vh;padding:1.6vh 1.3vw;display:flex;flex-direction:column;min-height:0;animation:in .55s ease both .1s}
  .panel h2{font-size:1.75vh;letter-spacing:.14em;color:var(--ink-3);text-transform:uppercase;display:flex;align-items:center;gap:.7vw}
  .panel h2 .chip{font-size:1.3vh;color:#14161a;background:var(--brand);border-radius:999px;padding:.2vh .6vw;font-weight:800;letter-spacing:.04em}
  .panel h2 .hint{margin-left:auto;color:var(--ink-3);font-weight:400;letter-spacing:0;text-transform:none;font-size:1.45vh}
  .rows{flex:1;display:flex;flex-direction:column;justify-content:space-evenly;min-height:0;margin-top:.4vh}

  .row{display:grid;grid-template-columns:2.6vw 14.5vw 1fr 12.5vw;align-items:center;gap:1vw}
  .rank{font-size:2.3vh;font-weight:800;color:var(--ink-3);text-align:center}
  .row.r1 .rank{color:var(--gold)} .row.r2 .rank{color:var(--silver)} .row.r3 .rank{color:var(--bronze)}
  .who{overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .who .nm{font-size:2.3vh;font-weight:700}
  .who .sub{font-size:1.45vh;color:var(--ink-3)}
  .track{position:relative;height:22px;background:var(--panel-2);border-radius:4px;overflow:hidden}
  .fill{position:absolute;inset:0 auto 0 0;background:var(--data);border-radius:0 4px 4px 0;min-width:4px;transition:width .9s ease}
  .row.r1 .fill{background:linear-gradient(90deg,var(--data),#5ea4f0)}
  .row .val{text-align:right}
  .row .val .a{font-size:2.4vh;font-weight:800}
  .row .val .b{font-size:1.45vh;color:var(--ink-2)}
  .crown{margin-left:.4vw;display:inline-block;filter:drop-shadow(0 0 6px rgba(233,184,60,.75));animation:bob 2.4s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:rotate(14deg)}50%{transform:rotate(8deg) translateY(-2px)}}

  .pager{display:flex;gap:.5vw;justify-content:center;padding:.9vh 0 .1vh}
  .pip{width:.95vh;height:.95vh;border-radius:50%;background:var(--line);transition:all .3s}
  .pip.on{background:var(--brand);box-shadow:0 0 8px rgba(233,184,60,.6);transform:scale(1.2)}

  .rail{display:flex;flex-direction:column;gap:1vh;min-height:0}
  .rail .panel{flex:1}
  .pwrap{display:flex;flex-direction:column;justify-content:space-evenly;flex:1;min-height:0;margin-top:.3vh}
  .pitem{display:flex;flex-direction:column;gap:.35vh}
  .prow{display:grid;grid-template-columns:1.8vw 1fr 8.5vw;align-items:center;gap:.7vw}
  .prow .rank{font-size:1.8vh}
  .prow .nm{font-size:1.95vh;font-weight:650;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
  .prow .val{text-align:right;font-size:1.95vh;font-weight:750}
  .prow .val small{display:block;font-weight:400;font-size:1.3vh;color:var(--ink-3)}
  .ptrack{grid-column:2/4;position:relative;height:14px;background:var(--panel-2);border-radius:4px;overflow:hidden}
  .pfill{position:absolute;inset:0 auto 0 0;background:var(--data-2);border-radius:0 4px 4px 0;min-width:3px;transition:width .9s ease}
  .empty{color:var(--ink-3);font-size:1.7vh;padding:1vh 0}

  #tickerbar{position:relative;z-index:2;display:flex;align-items:center;background:var(--panel);border-top:2px solid var(--brand);margin:0 -2.2vw;height:6vh}
  #tickerbar .tag{background:var(--brand);color:#14161a;font-weight:800;letter-spacing:.1em;font-size:1.85vh;display:flex;align-items:center;height:100%;padding:0 1.3vw;white-space:nowrap}
  .tickerclip{overflow:hidden;flex:1;height:100%;display:flex;align-items:center}
  #ticker{display:inline-flex;gap:3.5vw;white-space:nowrap;animation:scroll 50s linear infinite;padding-left:2vw;will-change:transform}
  @keyframes scroll{to{transform:translateX(-50%)}}
  .titem{font-size:2.1vh;color:var(--ink-2)}
  .titem b{color:var(--ink)} .titem .amt{color:var(--data);font-weight:800} .titem .sep{color:var(--ink-3);margin:0 .45vw}

  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  #celebrate{position:fixed;inset:0;display:none;align-items:center;justify-content:center;z-index:40;background:rgba(8,10,13,.75);backdrop-filter:blur(4px)}
  #celebrate .card{background:var(--panel);border:2px solid var(--brand);border-radius:2vh;padding:5vh 6vw;text-align:center;animation:pop .5s cubic-bezier(.2,1.6,.4,1);box-shadow:0 0 60px rgba(233,184,60,.25)}
  @keyframes pop{from{transform:scale(.6);opacity:0}}
  #celebrate .t1{font-size:3vh;letter-spacing:.2em;color:var(--brand);font-weight:800}
  #celebrate .t2{font-size:7.5vh;font-weight:900;margin:1.2vh 0}
  #celebrate .t3{font-size:3.1vh;color:var(--ink-2)}
  #soundhint{position:fixed;right:1.2vw;bottom:7.2vh;color:var(--ink-3);font-size:1.35vh;z-index:3}
</style>
</head>
<body>
<div class="aurora"><div class="blob b1"></div><div class="blob b2"></div></div>

<div id="app">
  <header>
    <div class="logo"><b>KEY</b><span>LOAN SCOREBOARD</span></div>
    <div class="live"><span class="livedot"></span><span id="updated">LIVE</span></div>
    <div id="clock" class="num"></div>
  </header>

  <section class="tiles">
    <div class="tile ytd"><div class="k" id="k-ytd">Funded YTD</div><div class="v num" id="t-ytd">—</div><div class="s" id="t-ytd-sub"></div></div>
    <div class="tile"><div class="k">Loans YTD</div><div class="v num" id="t-loans">—</div><div class="s" id="t-loans-sub"></div></div>
    <div class="tile month"><div class="k" id="k-month">This Month</div><div class="v num" id="t-month">—</div><div class="s" id="t-month-sub"></div></div>
    <div class="tile"><div class="k">Last Funded</div><div class="v num" id="t-last">—</div><div class="s" id="t-last-sub"></div></div>
  </section>

  <main>
    <div class="panel">
      <h2>Account Executives <span class="chip num" id="yearchip"></span><span class="hint">funded volume · loans</span></h2>
      <div class="rows" id="aeRows"></div>
      <div class="pager" id="pager"></div>
    </div>
    <div class="rail">
      <div class="panel">
        <h2>Processors <span class="hint">loans processed</span></h2>
        <div class="pwrap" id="procRows"></div>
      </div>
      <div class="panel">
        <h2 id="monthHdr">Month Leaders</h2>
        <div class="pwrap" id="monthRows"></div>
      </div>
    </div>
  </main>
</div>

<div id="tickerbar">
  <div class="tag">💸 JUST FUNDED</div>
  <div class="tickerclip"><div id="ticker"></div></div>
</div>
<div id="soundhint">tap once to arm sound 🔊</div>

<div id="celebrate"><div class="card">
  <div class="t1">🎉 JUST FUNDED 🎉</div>
  <div class="t2 num" id="c-amt"></div>
  <div class="t3" id="c-who"></div>
</div></div>
<canvas id="confetti"></canvas>

<script>
const DATA_URL="leaderboard.json";
const PAGE_MS=10000, REFRESH_MS=60000, PER_PAGE=8;
const fmt$=n=>"$"+Math.round(n||0).toLocaleString("en-US");
const fmt$s=n=>{n=n||0;if(n>=1e6)return "$"+(n/1e6).toFixed(2).replace(/\.?0+$/,"")+"M";if(n>=1e3)return "$"+Math.round(n/1e3)+"K";return "$"+n};
let data=null,page=0,pages=1;

/* ---- audio: synth fanfare, armed on first interaction ---- */
let actx=null,soundOn=false;
function armSound(){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();if(actx.state==="suspended")actx.resume();soundOn=true;document.getElementById("soundhint").style.display="none"}catch(e){}}
addEventListener("pointerdown",armSound);addEventListener("keydown",armSound);
function fanfare(){
  if(!soundOn||!actx)return;
  const notes=[[523,0,.18],[659,.14,.18],[784,.28,.2],[1047,.44,.5],[784,.78,.14],[1047,.9,.7]];
  for(const [f,t,d] of notes){
    const o=actx.createOscillator(),g=actx.createGain();
    o.type="triangle";o.frequency.value=f;
    g.gain.setValueAtTime(0,actx.currentTime+t);
    g.gain.linearRampToValueAtTime(.22,actx.currentTime+t+.03);
    g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+t+d);
    o.connect(g).connect(actx.destination);o.start(actx.currentTime+t);o.stop(actx.currentTime+t+d+.05);
  }
}

/* ---- confetti ---- */
const cv=document.getElementById("confetti"),cx=cv.getContext("2d");
let pieces=[],rafOn=false;
function sizeCv(){cv.width=innerWidth;cv.height=innerHeight}
sizeCv();addEventListener("resize",sizeCv);
function burst(){
  const colors=["#e9b83c","#3987e5","#199e70","#ffffff","#e66767","#9085e9"];
  for(let i=0;i<260;i++)pieces.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*.3,
    vx:(Math.random()-.5)*2.4,vy:2+Math.random()*3.4,s:6+Math.random()*8,rot:Math.random()*6.28,vr:(Math.random()-.5)*.25,
    c:colors[i%colors.length]});
  if(!rafOn){rafOn=true;requestAnimationFrame(step)}
}
function step(){
  cx.clearRect(0,0,cv.width,cv.height);
  pieces=pieces.filter(p=>p.y<cv.height+30);
  for(const p of pieces){p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.rot+=p.vr;
    cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);cx.fillStyle=p.c;cx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.62);cx.restore()}
  if(pieces.length)requestAnimationFrame(step);else{rafOn=false;cx.clearRect(0,0,cv.width,cv.height)}
}

/* ---- render ---- */
const esc=s=>String(s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function medal(r){return r===1?"r1":r===2?"r2":r===3?"r3":""}
function render(){
  if(!data)return;
  const reps=(data.reps||[]).slice().sort((a,b)=>(b.year.loanAmount||0)-(a.year.loanAmount||0));
  const board=reps.filter(r=>(r.year.loanAmount||0)>0||(r.year.loans||0)>0);
  const totY=board.reduce((s,r)=>s+(r.year.loanAmount||0),0);
  const nY=board.reduce((s,r)=>s+(r.year.loans||0),0);
  const totM=board.reduce((s,r)=>s+(r.month.loanAmount||0),0);
  const nM=board.reduce((s,r)=>s+(r.month.loans||0),0);

  document.getElementById("yearchip").textContent=data.year;
  document.getElementById("k-ytd").textContent=`Funded ${data.year}`;
  document.getElementById("t-ytd").textContent=fmt$(totY);
  document.getElementById("t-ytd-sub").textContent=`${board.length} AEs on the board`;
  document.getElementById("t-loans").textContent=nY;
  document.getElementById("t-loans-sub").textContent=nY?`avg ${fmt$s(totY/nY)} per loan`:"";
  document.getElementById("k-month").textContent=data.monthLabel||"This Month";
  document.getElementById("t-month").textContent=fmt$(totM);
  document.getElementById("t-month-sub").textContent=`${nM} loan${nM===1?"":"s"} funded`;
  const last=(data.latest||[]).find(l=>(l.loanAmount||0)>0);
  if(last){
    document.getElementById("t-last").textContent=fmt$s(last.loanAmount);
    document.getElementById("t-last-sub").textContent=`${last.rep||""} · ${new Date(last.closedAt).toLocaleDateString("en-US",{month:"short",day:"numeric"})}`;
  }

  const maxAmt=Math.max(1,...board.map(r=>r.year.loanAmount||0));
  pages=Math.max(1,Math.ceil(board.length/PER_PAGE));
  if(page>=pages)page=0;
  const slice=board.slice(page*PER_PAGE,(page+1)*PER_PAGE);
  const mShort=(data.monthLabel||"Month").split(" ")[0];
  document.getElementById("aeRows").innerHTML=slice.map((r,i)=>{
    const rank=page*PER_PAGE+i+1;
    const w=Math.max(1.5,(r.year.loanAmount||0)/maxAmt*100);
    return `<div class="row ${medal(rank)}">
      <div class="rank num">${rank}</div>
      <div class="who"><span class="nm">${esc(r.name)}${rank===1?'<span class="crown">👑</span>':""}</span><div class="sub num">${esc(mShort)}: ${fmt$s(r.month.loanAmount)} · ${r.month.loans||0}</div></div>
      <div class="track"><div class="fill" style="width:${w}%"></div></div>
      <div class="val"><div class="a num">${fmt$(r.year.loanAmount)}</div><div class="b num">${r.year.loans||0} loan${(r.year.loans||0)===1?"":"s"}</div></div>
    </div>`}).join("");
  document.getElementById("pager").innerHTML=Array.from({length:pages},(_,i)=>`<div class="pip ${i===page?"on":""}"></div>`).join("");

  const procs=(data.processors||[]).slice().sort((a,b)=>(b.year.loans||0)-(a.year.loans||0)).filter(p=>(p.year.loans||0)>0).slice(0,6);
  const maxP=Math.max(1,...procs.map(p=>p.year.loans||0));
  document.getElementById("procRows").innerHTML=procs.map((p,i)=>`
    <div class="pitem">
      <div class="prow"><div class="rank num ${medal(i+1)}">${i+1}</div><div class="nm">${esc(p.name)}</div>
        <div class="val num">${p.year.loans}<small>${fmt$s(p.year.loanAmount)}</small></div></div>
      <div class="prow"><span></span><div class="ptrack"><div class="pfill" style="width:${Math.max(2,(p.year.loans||0)/maxP*100)}%"></div></div></div>
    </div>`).join("")||`<div class="empty">No processed loans yet this year</div>`;

  document.getElementById("monthHdr").innerHTML=`${esc(data.monthLabel||"This Month")} Leaders`;
  const mreps=board.filter(r=>(r.month.loanAmount||0)>0).sort((a,b)=>b.month.loanAmount-a.month.loanAmount).slice(0,5);
  const maxM=Math.max(1,...mreps.map(r=>r.month.loanAmount||0));
  document.getElementById("monthRows").innerHTML=mreps.map((r,i)=>`
    <div class="pitem">
      <div class="prow"><div class="rank num">${i+1}</div><div class="nm">${esc(r.name)}</div>
        <div class="val num">${fmt$s(r.month.loanAmount)}<small>${r.month.loans} loan${r.month.loans===1?"":"s"}</small></div></div>
      <div class="prow"><span></span><div class="ptrack"><div class="pfill" style="width:${Math.max(2,(r.month.loanAmount||0)/maxM*100)}%"></div></div></div>
    </div>`).join("")||`<div class="empty">Nothing funded yet this month — go get it 🚀</div>`;

  const items=(data.latest||[]).filter(l=>(l.loanAmount||0)>0).slice(0,12).map(l=>`<span class="titem"><span class="amt num">${fmt$(l.loanAmount)}</span><span class="sep">·</span><b>${esc(l.rep||"KREC")}</b><span class="sep">·</span>${esc(l.loanType||l.stage||"Funded")}<span class="sep">·</span>${new Date(l.closedAt).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</span>`);
  document.getElementById("ticker").innerHTML=items.join("")+items.join("");

  document.getElementById("updated").textContent="LIVE · updated "+new Date(data.updatedAt).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
}

/* ---- celebrate new fundings ---- */
function checkNew(){
  const KEY="klsb_seen_ids";
  const seen=new Set(JSON.parse(localStorage.getItem(KEY)||"[]"));
  const latest=(data.latest||[]).filter(l=>(l.loanAmount||0)>0).slice(0,12);
  const fresh=latest.filter(l=>l.id&&!seen.has(l.id));
  if(fresh.length&&seen.size){
    const f=fresh[0];
    document.getElementById("c-amt").textContent=fmt$(f.loanAmount);
    document.getElementById("c-who").textContent=`${f.rep||"KREC"} · ${f.loanType||"Funded"}`;
    const cel=document.getElementById("celebrate");
    cel.style.display="flex";
    burst();fanfare();setTimeout(burst,700);setTimeout(burst,1400);
    setTimeout(()=>{cel.style.display="none"},12000);
  }
  latest.forEach(l=>l.id&&seen.add(l.id));
  localStorage.setItem(KEY,JSON.stringify([...seen].slice(-200)));
}

/* ---- loops ---- */
async function load(){
  try{
    const r=await fetch(DATA_URL+"?t="+Date.now(),{cache:"no-store"});
    data=await r.json();render();checkNew();
  }catch(e){console.error(e)}
}
function tickClock(){document.getElementById("clock").textContent=new Date().toLocaleString("en-US",{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"})}
setInterval(()=>{page=(page+1)%pages;render()},PAGE_MS);
setInterval(load,REFRESH_MS);
setInterval(tickClock,1000);tickClock();
load();
setInterval(()=>{const d=new Date();if(d.getHours()===4&&d.getMinutes()===0)location.reload()},60000);
</script>
</body>
</html>
